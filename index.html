<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Flexin Movies</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: #0b0b0f;
    color: #fff;
    font-family: "Segoe UI", Tahoma, Arial, sans-serif;
    min-height: 100vh;
  }
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 28px;
    background: linear-gradient(180deg, #15151c 0%, rgba(11,11,15,0) 100%);
    position: sticky;
    top: 0;
    z-index: 5;
  }
  .header h1 {
    margin: 0;
    font-size: 28px;
    color: #e50914;
    letter-spacing: 1px;
  }
  .upload-btn {
    background: #e50914;
    color: #fff;
    border: none;
    padding: 10px 18px;
    border-radius: 6px;
    font-size: 14px;
    cursor: pointer;
    transition: background .15s ease;
  }
  .upload-btn:hover { background: #b00710; }
  .upload-btn:disabled { background: #555; cursor: not-allowed; }

  .section-title {
    padding: 0 28px;
    margin: 24px 0 12px;
    font-size: 18px;
    color: #ccc;
  }

  .movies {
    display: flex;
    gap: 14px;
    padding: 0 28px 28px;
    overflow-x: auto;
    scrollbar-width: thin;
  }
  .movies::-webkit-scrollbar { height: 8px; }
  .movies::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

  .card {
    min-width: 200px;
    max-width: 200px;
    background: #1a1a22;
    border-radius: 10px;
    padding: 10px;
    cursor: pointer;
    transition: transform .15s ease, box-shadow .15s ease;
  }
  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 20px rgba(229,9,20,0.25);
  }
  .card .thumb {
    width: 100%;
    height: 280px;
    background: #000;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #555;
    font-size: 48px;
  }
  .card .name {
    margin-top: 10px;
    font-size: 14px;
    color: #ddd;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .empty {
    padding: 0 28px 28px;
    color: #888;
  }

  .player-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }
  .player-overlay.open { display: flex; }
  .player-overlay video {
    width: min(92vw, 1100px);
    max-height: 88vh;
    border-radius: 8px;
    background: #000;
  }
  .player-close {
    position: absolute;
    top: 18px;
    left: 18px;
    background: #e50914;
    color: #fff;
    border: none;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 20px;
  }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: #1a1a22;
    color: #fff;
    padding: 12px 20px;
    border-radius: 6px;
    border: 1px solid #333;
    opacity: 0;
    transition: opacity .25s ease;
    pointer-events: none;
    z-index: 20;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<header class="header">
  <h1>Flexin Movies</h1>
  <div>
    <input id="fileInput" type="file" accept="video/*" style="display:none">
    <button id="uploadBtn" class="upload-btn">رفع فيلم</button>
  </div>
</header>

<h2 class="section-title">الأفلام المتاحة</h2>
<div id="movies" class="movies"></div>
<div id="empty" class="empty" style="display:none">لا توجد أفلام بعد. ابدأ برفع أول فيلم.</div>

<div id="player" class="player-overlay">
  <button class="player-close" id="closePlayer">×</button>
  <video id="videoEl" controls playsinline></video>
</div>

<div id="toast" class="toast"></div>

<script>
  const moviesEl = document.getElementById("movies");
  const emptyEl = document.getElementById("empty");
  const uploadBtn = document.getElementById("uploadBtn");
  const fileInput = document.getElementById("fileInput");
  const player = document.getElementById("player");
  const videoEl = document.getElementById("videoEl");
  const closePlayer = document.getElementById("closePlayer");
  const toastEl = document.getElementById("toast");

  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    setTimeout(() => toastEl.classList.remove("show"), 2200);
  }

  async function loadMovies() {
    moviesEl.innerHTML = "";
    try {
      const res = await fetch("/api/movies");
      const list = await res.json();
      if (!list.length) {
        emptyEl.style.display = "block";
        return;
      }
      emptyEl.style.display = "none";
      for (const m of list) {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <div class="thumb">▶</div>
          <div class="name">${m.name}</div>
        `;
        card.addEventListener("click", () => play(m));
        moviesEl.appendChild(card);
      }
    } catch (err) {
      toast("تعذّر تحميل قائمة الأفلام");
    }
  }

  function play(movie) {
    videoEl.src = movie.url;
    player.classList.add("open");
    videoEl.play().catch(() => {});
  }

  closePlayer.addEventListener("click", () => {
    player.classList.remove("open");
    videoEl.pause();
    videoEl.removeAttribute("src");
    videoEl.load();
  });

  uploadBtn.addEventListener("click", () => fileInput.click());

  fileInput.addEventListener("change", async () => {
    const file = fileInput.files?.[0];
    if (!file) return;
    uploadBtn.disabled = true;
    uploadBtn.textContent = "جاري الرفع...";
    try {
      const fd = new FormData();
      fd.append("movie", file);
      const res = await fetch("/api/movies", { method: "POST", body: fd });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.message || "Upload failed");
      }
      toast("تم الرفع بنجاح");
      await loadMovies();
    } catch (err) {
      toast(err.message || "فشل الرفع");
    } finally {
      uploadBtn.disabled = false;
      uploadBtn.textContent = "رفع فيلم";
      fileInput.value = "";
    }
  });

  loadMovies();
</script>
</body>
</html>
